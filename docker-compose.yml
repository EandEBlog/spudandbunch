# Production stack for Spud & Bunch.
#
#   docker compose up -d --build
#
# Flow: author publishes in Strapi → Strapi webhook → rebuild-hook (debounced,
# serialized) runs `astro build && pagefind` → publishes static files to the
# `site` volume → Caddy (`web`) serves them. The public site is static files
# only — zero runtime dependency on Strapi/Postgres.
#
# Secrets come from a gitignored root `.env` (see .env.example). Only `web` is
# meant to be public; Strapi's admin is behind its own login.
name: spudandbunch

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME:-strapi} -d ${DATABASE_NAME:-strapi}']
      interval: 5s
      timeout: 5s
      retries: 12

  strapi:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}
      DATABASE_SSL: 'false'
      APP_KEYS: ${APP_KEYS:?set APP_KEYS in .env}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?set API_TOKEN_SALT in .env}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET in .env}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:?set TRANSFER_TOKEN_SALT in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Reproducibly register the rebuild webhook on boot.
      REBUILD_WEBHOOK_URL: http://rebuild-hook:8080/webhook
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET in .env}
      # "Preview" button → preview service. PREVIEW_URL is how the author's
      # browser reaches the preview service (e.g. https://preview.yoursite.com
      # or http://your-host:4323).
      PREVIEW_ENABLED: 'true'
      PREVIEW_URL: ${PREVIEW_URL:?set PREVIEW_URL in .env}
      PREVIEW_SECRET: ${PREVIEW_SECRET:?set PREVIEW_SECRET in .env}
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:1337/_health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - '${STRAPI_PORT:-1337}:1337' # admin/API (behind login)

  rebuild-hook:
    build:
      context: .
      dockerfile: apps/rebuild-hook/Dockerfile
    restart: unless-stopped
    depends_on:
      strapi:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PUBLIC_STRAPI_URL: http://strapi:1337
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET in .env}
      SITE_DIR: /srv
    volumes:
      - site:/srv

  preview:
    build:
      context: .
      dockerfile: apps/preview/Dockerfile
    restart: unless-stopped
    depends_on:
      strapi:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      # API token that can read drafts (create in Strapi → Settings → API Tokens).
      PREVIEW_TOKEN: ${PREVIEW_TOKEN:?set PREVIEW_TOKEN in .env}
      PREVIEW_SECRET: ${PREVIEW_SECRET:?set PREVIEW_SECRET in .env}
    ports:
      - '${PREVIEW_PORT:-4323}:8080' # reachable by the author's browser

  web:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - rebuild-hook
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - site:/srv:ro
      - ./apps/web/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  strapi_uploads:
  site:
  caddy_data:
  caddy_config:
